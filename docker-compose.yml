services:
  backend1:
    build: .
    environment:
      - NAME=Backend 1

  backend2:
    build: .
    environment:
      - NAME=Backend 2

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend1
      - backend2

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  worker:
    build: ./worker
    depends_on:
      - redis
  mongodb:
    image: mongo
    ports:
      - "27017:27017"
